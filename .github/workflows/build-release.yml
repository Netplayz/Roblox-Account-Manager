name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet packages
      run: nuget restore "RBX Alt Manager.sln"

    - name: Build
      run: msbuild "RBX Alt Manager.sln" /p:Configuration=Release /p:Platform="Any CPU" /p:DisableFody=false

    - name: Upload build artifact
      uses: actions/upload-artifact@v3
      with:
        name: Roblox-Account-Manager
        path: build\Release\

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: Roblox-Account-Manager
        path: build\Release\

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: build\Release\Roblox Account Manager.exe
        asset_name: Roblox-Account-Manager-${{ github.ref_name }}.exe
        asset_content_type: application/octet-stream
