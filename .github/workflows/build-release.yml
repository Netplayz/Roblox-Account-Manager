name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore "RBX Alt Manager.sln"

    - name: Build
      run: msbuild "RBX Alt Manager.sln" /p:Configuration=Release /p:Platform="Any CPU" /p:DisableFody=false

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Roblox-Account-Manager
        path: build\Release\

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: Roblox-Account-Manager
        path: build\Release\

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: build\Release\Roblox Account Manager.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
